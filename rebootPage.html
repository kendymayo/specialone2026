<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>For You ❤️</title>
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="rebootpage">

    <div class="photo-frame">
        <img id="photo" src="src/image/wifephoto1.jpg">
    </div>

    <div class="loading-container">
        <div class="loading-bar" id="loadingBar"></div>
        <span id="progressText">0%</span>
    </div>
    <div>
        <p id="rebootcaption">
            <span id="mainText">Re-boot in progress : Collecting memories</span><span id="dots"></span>
        </p>
    </div>
    <div id="getStart" class="hidden">
        <button class="start-btn" onclick="showGreetingWords()">START 💚</button>
    </div>
    
<script src="script.js"></script>
</body>
</html>
